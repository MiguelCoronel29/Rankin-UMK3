    <style>
        /* --- ESTILOS OPTIMIZADOS --- */
        body {
            font-family: Arial, sans-serif;
            background: url('Imagenes/goku wallp.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            z-index: -1;

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #FFD700;
        }

        .table-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
            overflow-x: auto;
            border: 1px solid #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 10px 6px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        th {
            background: #222;
            color: #FFD700;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .player-link {
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: underline;
            text-decoration-color: #444;
        }

        .player-link:hover {
            color: #FFD700;
            transform: scale(1.05);
        }

        .player-flag {
            width: 22px;
            height: 15px;
            object-fit: cover;
            display: block;
            margin: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .rank-S {
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 5px gold;
        }

        .rank-A {
            color: #FF5252;
            font-weight: bold;
        }

        .rank-B {
            color: #4CAF50;
            font-weight: bold;
        }

        .rank-C {
            color: #03A9F4;
            font-weight: bold;
        }

        .rank-D {
            color: #BDBDBD;
            font-weight: bold;
        }

        .rank-E {
            color: #9E9E9E;
            font-weight: bold;
        }

        .progress {
            background: #333;
            height: 6px;
            border-radius: 6px;
            overflow: hidden;
            min-width: 50px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #81c784);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .hidden {
            display: none;
        }

        .modal-content {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #FFD700;
        }

        .pagination {
            text-align: center;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        .pagination button {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #FFD700;
            background: #111;
            color: #FFD700;
            font-weight: bold;
            cursor: pointer;
        }

        .pagination button.active {
            background: #FFD700;
            color: #111;
        }

        #searchRanking {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
            box-sizing: border-box;
        }
    </style>

<body>

    <div id="user-identity-container" style="max-width: 800px; margin: 10px auto; text-align: center;">
        <div id="user-bar"
            style="background: rgba(26,26,26,0.9); padding: 15px; border-radius: 10px; display: none; justify-content: space-between; align-items: center; border: 1px solid #FFD700;">
            <span style="color: white;">👤 Guerrero: <strong id="current-user-name"
                    style="color: #FFD700;"></strong></span>
            <div>
                <!-- 
                <button onclick="window.location.href='sala.html'"
                    style="background: #FFD700; color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">⚔️
                    Arena</button>-->
                <button onclick="cerrarSesion()"
                    style="background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Salir</button>

        <div id="login-prompt"
            style="background: rgba(26,26,26,0.9); padding: 20px; border-radius: 10px; border: 1px solid #444; display: none;">
            <p style="color: #aaa; margin-bottom: 15px;">Inicia sesión para registrar tus victorias y entrar a las
                salas:</p>
            <a href="login.html" style="text-decoration: none;">
                <button
                    style="background: #03a9f4; color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;">
                    🔑 INGRESAR AL RANKING
                </button>
            </a>

    <h1>🔥 RANKING UMK3 SEGA 🔥</h1>
    <div style="text-align: center; margin: 20px 0; max-width: 100%; overflow: hidden;">

        <script>
              atOptions = {
                'key' : 'ea7c460a95baaa7dc4a2bc45b7502fb2',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
              };
        </script>
        <script src="https://www.highperformanceformat.com/ea7c460a95baaa7dc4a2bc45b7502fb2/invoke.js"></script>
    </div>

    <input id="searchRanking" placeholder="🔍 Buscar guerrero...">

    <div id="onlineCounter" style="display: inline-block; background: rgba(76, 175, 80, 0.2); padding: 10px 20px; border-radius: 10px; font-size: 1.2rem; color: #4CAF50; border: 1px solid #4CAF50; margin: 15px auto; text-align: center;">
      Jugadores en línea: <strong id="onlineCount">0</strong> 🟢
    </div>

    <div id="offlineCounter" style="display: inline-block; background: rgba(158, 158, 158, 0.2); padding: 10px 20px; border-radius: 10px; font-size: 1.2rem; color: #9E9E9E; border: 1px solid #9E9E9E; margin: 10px auto; text-align: center;">
      Jugadores desconectados: <strong id="offlineCount">0</strong> ⚪
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>🌐</th>
                    <th>Guerrero</th>
                    <th>Rango</th>
                    <th>ELO</th>
                    <th>Progreso</th>
                    <th>W/L</th>
                    <th>Racha</th>
                </tr>
            </thead>
            <tbody id="ranking"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle" style="text-align:center; margin-top:0;"></h3>
            <div id="modalStats" style="background: #2a2a2a; padding: 15px; border-radius: 10px; margin: 10px 0;"></div>
            <canvas id="eloChart" width="400" height="200"></canvas>
            <h4 style="margin: 15px 0 5px 0; font-size: 0.9rem; color: #FFD700;">Últimas Peleas:</h4>
            <ul id="modalHistory" style="list-style: none; padding: 0; margin-bottom: 20px;"></ul>
            <button onclick="closeModal()"
                style="width:100%; padding:12px; cursor:pointer; background: #444; color: white; border: none; border-radius: 8px; font-weight: bold;">Cerrar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Firebase Compat - NECESARIO para que funcione tu código actual -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- CONFIGURACIÓN FIREBASE NUEVA PARA UMK3 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBSmvBdsHLxpEDaLxqZa-nMQ3m9oAccPVQ",
        authDomain: "ranking-umk3.firebaseapp.com",
        databaseURL: "https://ranking-umk3-default-rtdb.firebaseio.com",
        projectId: "ranking-umk3",
        storageBucket: "ranking-umk3.firebasestorage.app",
        messagingSenderId: "964361830430",
        appId: "1:964361830430:web:b183cb5506153934be2e0f"
    };

    // Inicializa Firebase (versión compat)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
        let alreadyMarkedOnline = {}; // objeto para marcar por usuario (evita repetir)



        let players = [], history = [];
        const PAGE_SIZE = 10;
        let currentPage = 1;
        let chartInstance = null;

        const ranks = [
            { name: "E", min: 0, max: 699, class: "rank-E" },
            { name: "D", min: 700, max: 999, class: "rank-D" },
            { name: "C", min: 1000, max: 1299, class: "rank-C" },
            { name: "B", min: 1300, max: 1599, class: "rank-B" },
            { name: "A", min: 1600, max: 1899, class: "rank-A" },
            { name: "S", min: 1900, max: Infinity, class: "rank-S" }
        ];

        function getBanderaHTML(country) {
            if (!country) return "🏳️";
            const banderas = { "ARGENTINA": "bandera argentina.png",
              "PERÚ": "bandera peru.png",
              "PARAGUAY": "bandera paraguay.png",
              "CHILE": "bandera chile.png",
              "URUGUAY": "bandera uruguay.png",
              "BRASIL": "bandera brasil.png",
              "VENEZUELA": "bandera venezuela.png"     // clave exacta
            };

            const file = banderas[country.toUpperCase()];
            return file ? `<img src="Imagenes/${file}" class="player-flag">` : "🏳️";
        }

        function getRank(e) { return ranks.find(r => e >= r.min && e <= r.max) || ranks[0]; }
        function getProgress(e, r) { return r.name === "S" ? 100 : Math.max(5, Math.min(100, ((e - r.min) / (r.max - r.min)) * 100)); }

        db.ref('/').on('value', snapshot => {
            const data = snapshot.val();
            players = data?.players || [];
            history = data?.history || [];
            history.sort((a, b) => {
                const timeA = a.timestamp || parseInt(a.id) || 0;
                const timeB = b.timestamp || parseInt(b.id) || 0;
                return timeB - timeA;
            });
            render();
            verificarSesion();
        
                        // Listener para status online/offline (normaliza nombre con guion)
        db.ref('status').on('value', snapshot => {
              const statusData = snapshot.val() || {};
              console.log("Status data recibida:", statusData);
            
              document.querySelectorAll('[id^="status-"]').forEach(span => {
                const rawId = span.id.replace('status-', '');
                // Normaliza: reemplaza _ por - (para coincidir con Firebase)
                const playerName = rawId.replace(/_/g, '-');
            
                console.log("Span ID:", span.id, "Nombre normalizado:", playerName, "Status:", statusData[playerName]);
            
                const userStatus = statusData[playerName];
                if (userStatus && userStatus.online === true) {
                  span.innerHTML = '🟢';
                  span.style.color = '#4CAF50';
                } else {
                  span.innerHTML = '⚪';
                  span.style.color = '#9E9E9E';
                }
              });
                    // Contador de jugadores online
                const onlinePlayers = Object.values(statusData).filter(s => s.online === true).length;
                document.getElementById('onlineCount').innerText = onlinePlayers;
                console.log("Jugadores online:", onlinePlayers); // opcional, para debug

                    // Contador offline (nuevo)
                const offlinePlayers = Object.values(statusData).filter(s => s.online === false).length;
                document.getElementById('offlineCount').innerText = offlinePlayers;
            });
        });
        function render() {
            const rankingEl = document.getElementById('ranking');
            const busqueda = document.getElementById('searchRanking').value.toLowerCase();

            // Ordenar por ELO
            let ordenados = [...players].sort((a, b) => b.elo - a.elo);

            // Filtrar
            let filtrados = ordenados.filter(p => p.name.toLowerCase().includes(busqueda));

            // Paginación
            const start = (currentPage - 1) * PAGE_SIZE;
            const visibles = filtrados.slice(start, start + PAGE_SIZE);

            rankingEl.innerHTML = visibles.map((p) => {
                const r = getRank(p.elo);
                const pos = ordenados.findIndex(x => x.name === p.name) + 1;
                const rachaClass = p.streak > 0 ? 'color:#4caf50' : 'color:#ff5252';
                const rachaIcon = p.streak > 0 ? '🔥' : (p.streak < 0 ? '💀' : '');

                return `<tr>
      <td style="font-weight:bold; color:#aaa;">${pos}</td>
      <td>${getBanderaHTML(p.country)}</td>
      <td>
      <span class="player-link" onclick="openModal('${p.name}')">
            ${p.name}
            <span id="status-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}" style="margin-left: 8px; font-size: 1.1em; vertical-align: middle;"></span>
          </span>
      </td>
      <td class="${r.class}">${r.name}</td>
      <td style="font-weight:bold;">${Math.round(p.elo)}</td>
      <td><div class="progress"><div class="progress-fill" style="width:${getProgress(p.elo, r)}%"></div></div></td>
      <td>${p.wins}/${p.losses}</td>
      <td style="${rachaClass}; font-weight:bold;">${rachaIcon} ${Math.abs(p.streak || 0)}</td>
    </tr>`;
            }).join("");

            renderPagination(filtrados.length);
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / PAGE_SIZE);
            const container = document.getElementById('pagination');
            container.innerHTML = "";
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                if (i === currentPage) btn.className = "active";
                btn.onclick = () => { currentPage = i; render(); };
                container.appendChild(btn);
            }
        }

        function verificarSesion() {
            const nombre = localStorage.getItem("logged_user");
            const userBar = document.getElementById("user-bar");
            const loginPrompt = document.getElementById("login-prompt");
            const nameDisplay = document.getElementById("current-user-name");
        
            if (nombre) {
                userBar.style.display = "flex";
                loginPrompt.style.display = "none";
                nameDisplay.innerText = nombre;
        
                // Marca online SOLO una vez por sesión
                if (!alreadyMarkedOnline[nombre]) {
                    alreadyMarkedOnline[nombre] = true;
        
                    const statusRef = db.ref('status/' + nombre);
        
                    statusRef.set({
                        online: true,
                        lastActive: firebase.database.ServerValue.TIMESTAMP,
                        device: navigator.userAgent
                    }).then(() => {
                        console.log(nombre + " marcado como ONLINE (solo una vez)");
                    }).catch(err => console.error("Error al marcar online:", err));
        
                    statusRef.onDisconnect().set({
                        online: false,
                        lastActive: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        console.log("onDisconnect configurado para " + nombre);
                    }).catch(err => console.error("Error en onDisconnect:", err));
                }
            } else {
                userBar.style.display = "none";
                loginPrompt.style.display = "block";
            }
        }
        
        function cerrarSesion() {
            if (confirm("¿Cerrar sesión de guerrero?")) {
                localStorage.removeItem("logged_user");
                location.reload();
            }
        }

        // --- MODAL Y GRÁFICO ---

        function openModal(name) {
            const p = players.find(x => x.name === name);
            if (!p) return;

            document.getElementById('modalTitle').innerHTML = `${getBanderaHTML(p.country)} ${p.name}`;
            document.getElementById('modalStats').innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align:left;">
            <div><b>Rango:</b> <span class="${getRank(p.elo).class}">${getRank(p.elo).name}</span></div>
            <div><b>ELO:</b> ${Math.round(p.elo)}</div>
            <div><b>Victorias:</b> ${p.wins}</div>
            <div><b>Derrotas:</b> ${p.losses}</div>
        </div>
        <button onclick="window.location.href='perfil.html?player=${encodeURIComponent(name)}'" 
                style="width:100%; margin-top:15px; padding:8px; background:#FFD700; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">
                VER PERFIL COMPLETO
        </button>
    `;

            // FIX: No invertimos porque history ya está ordenada descendente (nuevos primero)
            const ultimasPeleas = history.filter(h => h.p1 === name || h.p2 === name).slice(0, 5);

            // === Línea de debug para ver qué peleas está tomando ===
            console.log("Últimas peleas para", name, ":", ultimasPeleas.map(h => h.id + " | " + h.p1 + " vs " + h.p2));

            document.getElementById('modalHistory').innerHTML = ultimasPeleas.map(h => {
                const gano = (h.p1 === name && h.s1 > h.s2) || (h.p2 === name && h.s2 > h.s1);
                return `<li style="padding:5px 0; border-bottom:1px solid #333; font-size:0.85rem;">
            <span style="color:${gano ? '#4caf50' : '#ff5252'}">${gano ? 'WIN' : 'LOSS'}</span> | ${h.p1} ${h.s1} - ${h.s2} ${h.p2}
        </li>`;
            }).join("");   

            document.getElementById('modal').classList.remove("hidden");
            // Aquí podrías llamar a una función para dibujar el gráfico si lo deseas
        }

        function closeModal() { document.getElementById('modal').classList.add("hidden"); }

        document.getElementById('searchRanking').addEventListener('input', () => {
            currentPage = 1;
            render();
        });
    </script>
</body>

</html>
